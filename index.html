<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Админ каталог</title>
    <link rel="stylesheet" href="admin.css?v=20260225-2" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <strong>ADMIN CATALOG</strong>
        <small>Удержание 5 сек = редактирование</small>
      </div>
      <div class="top-actions">
        <button id="saveDraftBtn" class="btn ghost" type="button">Черновик</button>
        <button id="reloadBtn" class="btn ghost" type="button">Обновить</button>
      </div>
    </header>

    <main class="main">
      <section id="screen-home" class="screen active">
        <div class="section-head">
          <h2>Баннеры</h2>
          <button id="addBannerBtn" class="plus-btn" type="button">＋</button>
        </div>
        <div id="bannersList" class="banner-list"></div>

        <div class="section-head">
          <h2>Статьи</h2>
          <button id="addArticleBtn" class="plus-btn" type="button">＋</button>
        </div>
        <div id="articlesList" class="article-list"></div>

        <div class="section-head">
          <h2>Магазины</h2>
          <button id="addStoreBtn" class="plus-btn" type="button">＋</button>
        </div>
        <div id="storesList" class="chip-list"></div>

        <div class="section-head">
          <h2>Основные текстовые блоки</h2>
        </div>
        <div class="article-list">
          <article class="article-card holdable" id="aboutBlock" data-edit-kind="multiline" data-edit-label="aboutText">
            <span class="chip">about</span>
            <h3>О продукте</h3>
            <p id="aboutPreview"></p>
          </article>
          <article class="article-card holdable" id="productionBlock" data-edit-kind="multiline" data-edit-label="productionText">
            <span class="chip">production</span>
            <h3>Механика</h3>
            <p id="productionPreview"></p>
          </article>
          <article class="article-card holdable" id="paymentBlock" data-edit-kind="multiline" data-edit-label="paymentText">
            <span class="chip">payment</span>
            <h3>Оплата и условия</h3>
            <p id="paymentPreview"></p>
          </article>
          <article class="article-card holdable" id="contactsBlock" data-edit-kind="multiline" data-edit-label="contactsText">
            <span class="chip">contacts</span>
            <h3>Контакты</h3>
            <p id="contactsPreview"></p>
          </article>
        </div>
      </section>

      <section id="screen-categories" class="screen">
        <div class="section-head">
          <h2>Каталог</h2>
          <button id="addCategoryBtn" class="plus-btn" type="button">＋</button>
        </div>
        <div id="categoriesGrid" class="category-grid"></div>
      </section>

      <section id="screen-products" class="screen">
        <div class="section-head">
          <h2 id="productsTitle">Товары</h2>
          <button id="addProductBtn" class="plus-btn" type="button">＋</button>
        </div>
        <div id="productsGrid" class="product-grid"></div>
      </section>

      <section id="screen-product" class="screen">
        <div class="section-head">
          <h2>Карточка товара</h2>
          <div class="inline-actions">
            <button id="addImageBtn" class="plus-btn" type="button">＋ Фото</button>
            <button id="addSpecBtn" class="plus-btn" type="button">＋ Характеристика</button>
          </div>
        </div>
        <div id="productCard" class="product-full"></div>
      </section>

      <section id="screen-publish" class="screen">
        <div class="section-head">
          <h2>Публикация</h2>
        </div>
        <div class="publish-box">
          <button id="downloadConfigBtn" class="btn" type="button">Скачать config.json</button>
          <button id="downloadCategoriesBtn" class="btn" type="button">Скачать categories.json</button>
          <button id="downloadProductsBtn" class="btn" type="button">Скачать products.json</button>
          <button id="sendToBotBtn" class="btn primary" type="button">Отправить сводку в бота</button>
          <p id="status" class="status"></p>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button data-screen="home" class="bottom-item active" type="button">Главная</button>
      <button data-screen="categories" class="bottom-item" type="button">Каталог</button>
      <button data-screen="products" class="bottom-item" type="button">Товары</button>
      <button data-screen="publish" class="bottom-item" type="button">Публикация</button>
    </nav>

    <div id="editorModal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <h3 id="editorTitle">Редактирование</h3>
        <input id="editorInput" class="hidden" type="text" />
        <textarea id="editorTextarea" class="hidden" rows="8"></textarea>
        <div class="modal-actions">
          <button id="editorCancel" class="btn ghost" type="button">Отмена</button>
          <button id="editorSave" class="btn primary" type="button">Сохранить</button>
        </div>
      </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="admin.js?v=20260225-2"></script>
  </body>
</html>
